version: '3.8'

services:
  retechfin-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retechfin-admin
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - retechfin-network

networks:
  retechfin-network:
    driver: bridge

